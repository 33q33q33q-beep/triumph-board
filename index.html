<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIUMPH Team Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c8a84b;--gold-light:#f0e4b8;--gold-dark:#8a6e28;
  --bg:#f7f5f0;--surface:#ffffff;--border:#e8e3d9;
  --text:#1a1714;--muted:#6b6459;--subtle:#a09589;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

#loadingScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#loginScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;max-width:340px;width:100%}
.login-logo{font-size:22px;font-weight:600;letter-spacing:.08em;margin-bottom:8px}
.login-logo span{color:var(--gold)}
.login-sub{font-size:13px;color:var(--subtle);margin-bottom:2rem}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s}
.google-btn:hover{background:var(--bg);border-color:var(--gold)}

#mainApp{display:none}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:600;letter-spacing:.08em}
.logo span{color:var(--gold)}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--subtle)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#70ad47;animation:pulse 2s infinite}
.cal-badge{font-size:11px;background:#e8f1fb;color:#0c447c;padding:3px 10px;border-radius:20px;border:1px solid #b5d4f4}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold-light);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold-dark);overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg);border-color:var(--gold)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-danger{color:#8a1f1f;border-color:#f0c0c0}
.btn-danger:hover{background:#fceaea}
.btn-sm{font-size:11px;padding:4px 12px}

.content{padding:2rem;max-width:1300px}
.summary-row{display:flex;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;justify-content:space-between}
.summary-pills{display:flex;gap:10px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid transparent}
.pill-dot{width:8px;height:8px;border-radius:50%}
.date-str{font-family:'DM Mono',monospace;font-size:12px;color:var(--subtle)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

/* ── カード ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--gold-light);box-shadow:0 2px 12px rgba(200,168,75,.08)}
.card.is-mine{border-color:#d4aa00}

/* ── 顔アイコン ── */
.face-wrap{position:relative;width:64px;height:64px;margin:0 auto 10px;flex-shrink:0}
.face-svg{width:64px;height:64px}
.steam{position:absolute;top:-14px;left:50%;transform:translateX(-50%);display:flex;gap:4px;opacity:0;transition:opacity .5s}
.steam.show{opacity:1}
.steam-line{width:3px;border-radius:2px;animation:steamUp 1.2s ease-in-out infinite}
.steam-line:nth-child(1){height:10px;animation-delay:0s;background:#ff8a65}
.steam-line:nth-child(2){height:14px;animation-delay:.2s;background:#ff7043}
.steam-line:nth-child(3){height:10px;animation-delay:.4s;background:#ff8a65}
@keyframes steamUp{0%{transform:translateY(0) scaleX(1);opacity:.8}100%{transform:translateY(-12px) scaleX(1.5);opacity:0}}
.sweat{position:absolute;top:12px;right:4px;font-size:14px;opacity:0;transition:opacity .5s;animation:sweatDrop 1.5s ease-in-out infinite}
.sweat.show{opacity:1}
@keyframes sweatDrop{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
.mine-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);animation:ringPulse 2s infinite}
@keyframes ringPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}

.card-top{display:flex;flex-direction:column;align-items:center;margin-bottom:12px}
.card-name{font-size:14px;font-weight:600;text-align:center;line-height:1.3}
.card-role{font-size:11px;color:var(--subtle);text-align:center;margin-top:2px}
.mine-badge{font-size:10px;background:var(--gold-light);color:var(--gold-dark);padding:1px 6px;border-radius:10px;margin-top:3px;display:inline-block}

.meter-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.meter-label{font-size:11px;color:var(--muted)}
.meter-pct{font-size:14px;font-weight:600}
.track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px;border:1px solid var(--border)}
.bar{height:100%;border-radius:3px;transition:width .5s ease}
.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.chip-dot{width:6px;height:6px;border-radius:50%}

.events-block{border-top:1px solid var(--border);padding-top:6px;margin-bottom:4px}
.ev-row{display:flex;align-items:flex-start;gap:5px;padding:2px 0;font-size:10px}
.ev-time{font-family:'DM Mono',monospace;color:var(--subtle);white-space:nowrap;min-width:68px}
.ev-title{color:var(--text);font-weight:500;line-height:1.4}
.no-ev{font-size:11px;color:var(--subtle);padding:3px 0}

.edit-controls{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.adj-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.adj-label{font-size:10px;color:var(--subtle);white-space:nowrap}
.adj-row input[type=range]{flex:1;accent-color:var(--gold);cursor:pointer}
.adj-val{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);min-width:28px;text-align:right}
.comment-disp{font-size:11px;color:var(--muted);cursor:pointer;padding:2px 0;min-height:16px;line-height:1.5}
.comment-disp:hover{color:var(--text)}
.comment-disp.empty{color:var(--subtle);font-style:italic}
.comment-inp{width:100%;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:4px 7px;background:var(--bg);color:var(--text);resize:none;font-family:'DM Sans',sans-serif}
.comment-inp:focus{outline:none;border-color:var(--gold)}
.save-sm{font-size:10px;padding:2px 10px;margin-top:3px;border-radius:5px;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif}
.save-sm:hover{border-color:var(--gold);color:var(--gold-dark)}
.readonly-block{margin-top:8px;padding-top:6px;border-top:1px solid var(--border);min-height:16px}
.comment-readonly{font-size:11px;color:var(--muted);font-style:italic}

/* ── ドロワー ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:-480px;bottom:0;width:460px;background:var(--surface);border-left:1px solid var(--border);z-index:201;transition:right .3s ease;display:flex;flex-direction:column}
.drawer.open{right:0}
.drawer-head{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-size:16px;font-weight:600}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--bg)}
.drawer-body{flex:1;overflow-y:auto;padding:1.5rem}
.drawer-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.member-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.member-row{display:grid;grid-template-columns:20px 32px 1fr 1fr auto;gap:8px;align-items:center;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);transition:box-shadow .15s}
.member-row:hover{border-color:var(--gold-light)}
.member-row.dragging{opacity:.4}
.member-row.drag-over{border-color:var(--gold);background:var(--gold-light)}
.drag-handle{cursor:grab;color:var(--subtle);display:flex;flex-direction:column;gap:2px;align-items:center;user-select:none}
.drag-handle:active{cursor:grabbing}
.drag-handle span{display:block;width:12px;height:2px;background:currentColor;border-radius:1px}
.m-avatar-sm{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.m-inp{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;width:100%}
.m-inp:focus{outline:none;border-color:var(--gold)}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--subtle);text-transform:uppercase;margin-bottom:10px;margin-top:1.5rem}
.section-label:first-child{margin-top:0}
.divider{height:1px;background:var(--border);margin:1rem 0}
.add-form{background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-label{font-size:11px;color:var(--subtle);margin-bottom:3px}
.form-inp{font-size:13px;padding:7px 10px;width:100%;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif}
.form-inp:focus{outline:none;border-color:var(--gold)}
.color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-opt:hover{transform:scale(1.15)}
.color-opt.selected{border-color:var(--text)}

.page-footer{margin-top:2rem;padding:1rem 1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-note{font-size:12px;color:var(--subtle)}

@media(max-width:600px){.content{padding:1rem}.drawer{width:100%;right:-100%}.header{padding:0 1rem}}
</style>
</head>

</div>

<div id="mainApp">

    </div>
    <div class="grid" id="grid"></div>
    <div class="page-footer">
      <div class="footer-note">このURLをChatWorkやSlackで共有 — 全員がリアルタイムで確認できます</div>
      <button class="btn btn-sm" onclick="copyUrl()">🔗 URLをコピー</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title">メンバー管理</div>
    <button class="close-btn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">
    <button class="btn btn-gold" onclick="saveMembers()">変更を保存</button>
    <button class="btn" onclick="closeDrawer()">キャンセル</button>
  </div>
</div>

<script type="module">

const firebaseConfig = {
  apiKey:"AIzaSyCELbdDjM3aifraIywNfWiKAdVX8-4ZIaU",
  authDomain:"triumph-board-25e28.firebaseapp.com",

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ── 定数 ──
const ADMIN_EMAILS = ["33q33q33q@gmail.com","sawaguchi@e-production.jp"];
const WORK_MINS = 480;

const COLORS = [
  {bg:"#fdf6e3",fg:"#c8a84b"},{bg:"#e8f1fb",fg:"#5b9bd5"},
  {bg:"#edf6e5",fg:"#70ad47"},{bg:"#fbe9de",fg:"#c55a11"},
  {bg:"#f1e8fa",fg:"#7030a0"},{bg:"#e0f5fc",fg:"#00b0f0"},
  {bg:"#ffeaea",fg:"#c0392b"},{bg:"#e8faf0",fg:"#27ae60"},
  {bg:"#fff3e0",fg:"#e67e22"},{bg:"#f3e5f5",fg:"#8e44ad"},

const DEFAULT_MEMBERS = [

// Googleカレンダー → メンバーID マッピング
const CAL_IDS = {

};

// ── State ──
let currentUser = null;
let myMemberId = null;
let members = [];
let states = {};
let calData = {};   // {memberId: [{time,name,mins}]}
let editingMembers = [];
let newColorIdx = 0;
let dragSrcId = null;

// ── カレンダー自動更新 ──
// Firebase経由でカレンダーデータを保存・共有
// 管理者ログイン時にGoogle Calendar APIから取得してFirebaseに保存
// 全員がFirebaseから読むことでリアルタイム反映

async function fetchCalendarData() {
  // Firebaseに保存されているカレンダーデータを読む
  const snap = await get(ref(db,"calData"));
  if (snap.exists()) {
    const saved = snap.val();
    // 今日の日付と一致するか確認
    const today = new Date().toISOString().slice(0,10);
    if (saved.date === today) {
      calData = saved.events || {};
      updateCalBadge(saved.updatedAt);
      return;
    }
  }
  // データがないか古い場合はデフォルト表示
  calData = {};
}

function updateCalBadge(ts) {
  const badge = document.getElementById("calBadge");
  if (!badge) return;
  if (ts) {
    const d = new Date(ts);
    const hm = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    const wl = calData.weekLabel || "";
    badge.textContent = `Cal: ${wl} ${hm}更新`;
    badge.style.background = "#eaf3ec";
    badge.style.color = "#1e5e30";
    badge.style.borderColor = "#b8dcc0";
  } else {
    badge.textContent = "Cal: 未同期";
  }
}

// ── 計算（週間平均 + 本人調整） ──
const calcPct = (id) => {
  // 週間平均がFirebaseにある場合はそれを使う
  const weeklyPct = calData.weeklyPct ? (calData.weeklyPct[id] || 0) : (() => {
    const evs = (calData.events || calData)[id] || [];
    const mins = evs.reduce((s,e)=>s+(e.mins||0),0);
    const calBase = Math.min(Math.round((mins/WORK_MINS)*100),100);
    return Math.min(calBase + Math.min(evs.length*5,20), 100);
  })();
  const adj = (states[id]||{}).adj||0;
  return Math.max(0,Math.min(100,weeklyPct+adj));
};

const getLevel = (pct) => {
  if (pct<=20) return {label:"余裕あり",dot:"#3d7a4a",bar:"#3d7a4a",bbg:"#eaf3ec",btx:"#1e5e30"};
  if (pct<=45) return {label:"ふつう",dot:"#8a6e00",bar:"#d4aa00",bbg:"#fef9e6",btx:"#8a6e00"};
  if (pct<=70) return {label:"やや忙しい",dot:"#8a4500",bar:"#e07820",bbg:"#fef0dc",btx:"#8a4500"};
  return {label:"キツい！",dot:"#8a1f1f",bar:"#d04040",bbg:"#fceaea",btx:"#8a1f1f"};
};

// ── 顔SVG生成 ──
function faceSvg(pct, colorFg, colorBg) {
  // 忙しさに応じて顔が変わる
  // 0-20: にこにこ（水色背景）
  // 21-45: ふつう（黄色背景）
  // 46-70: やや困り顔（オレンジ背景）
  // 71-100: 真っ赤・汗（赤背景）

  let faceColor, cheekColor, eyeExpr, mouthPath, bgColor, strokeColor;

  if (pct <= 20) {
    bgColor = "#dff0ff"; faceColor = "#ffe0b2"; cheekColor = "#ffb3ba";
    strokeColor = "#5b9bd5";
    eyeExpr = `
      <ellipse cx="20" cy="25" rx="3" ry="3.5" fill="#3a2a1a"/>
      <ellipse cx="44" cy="25" rx="3" ry="3.5" fill="#3a2a1a"/>
      <ellipse cx="19" cy="24" rx="1.2" ry="1.2" fill="white"/>
      <ellipse cx="43" cy="24" rx="1.2" ry="1.2" fill="white"/>`;
    mouthPath = `<path d="M20 37 Q32 46 44 37" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  } else if (pct <= 45) {
    bgColor = "#fffde7"; faceColor = "#ffe0b2"; cheekColor = "#ffccbc";
    strokeColor = "#d4aa00";
    eyeExpr = `
      <ellipse cx="20" cy="25" rx="3" ry="3" fill="#3a2a1a"/>
      <ellipse cx="44" cy="25" rx="3" ry="3" fill="#3a2a1a"/>
      <ellipse cx="19" cy="24" rx="1.2" ry="1.2" fill="white"/>
      <ellipse cx="43" cy="24" rx="1.2" ry="1.2" fill="white"/>`;
    mouthPath = `<path d="M22 38 Q32 43 42 38" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  } else if (pct <= 70) {
    bgColor = "#fff3e0"; faceColor = "#ffcc80"; cheekColor = "#ffb74d";
    strokeColor = "#e07820";
    eyeExpr = `
      <ellipse cx="20" cy="25" rx="3" ry="2.5" fill="#3a2a1a"/>
      <ellipse cx="44" cy="25" rx="3" ry="2.5" fill="#3a2a1a"/>
      <ellipse cx="19" cy="24" rx="1.2" ry="1" fill="white"/>
      <ellipse cx="43" cy="24" rx="1.2" ry="1" fill="white"/>
      <path d="M17 20 Q20 18 23 20" stroke="#5a3a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M41 20 Q44 18 47 20" stroke="#5a3a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
    mouthPath = `<path d="M22 39 Q32 36 42 39" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  } else {
    bgColor = "#ffebee"; faceColor = "#ef9a9a"; cheekColor = "#e57373";
    strokeColor = "#d04040";
    eyeExpr = `
      <ellipse cx="20" cy="26" rx="3.5" ry="2.5" fill="#3a2a1a"/>
      <ellipse cx="44" cy="26" rx="3.5" ry="2.5" fill="#3a2a1a"/>
      <ellipse cx="18.5" cy="25" rx="1.2" ry="1" fill="white"/>
      <ellipse cx="42.5" cy="25" rx="1.2" ry="1" fill="white"/>
      <path d="M16 19 Q20 16 24 19" stroke="#7a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M40 19 Q44 16 48 19" stroke="#7a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="52" y="22" font-size="10" fill="#42a5f5">💧</text>`;
    mouthPath = `
      <path d="M22 40 Q32 34 42 40" stroke="#7a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="32" cy="38" rx="6" ry="4" fill="#c0392b" opacity=".3"/>`;
  }

  return `<svg class="face-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="30" fill="${bgColor}" stroke="${strokeColor}" stroke-width="1.5"/>
    <ellipse cx="32" cy="34" rx="22" ry="22" fill="${faceColor}"/>
    <ellipse cx="14" cy="36" rx="6" ry="4" fill="${cheekColor}" opacity=".5"/>
    <ellipse cx="50" cy="36" rx="6" ry="4" fill="${cheekColor}" opacity=".5"/>
    ${eyeExpr}
    ${mouthPath}
  </svg>`;
}

// ── レンダリング ──
function renderBoard() {
  const d = new Date();
  const wd=["日","月","火","水","木","金","土"];
  document.getElementById("dateStr").textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;

  const counts=[0,0,0,0];
  members.forEach(m=>{const p=calcPct(m.id);if(p<=20)counts[0]++;else if(p<=45)counts[1]++;else if(p<=70)counts[2]++;else counts[3]++;});
  const ld=[
    {label:"余裕あり",dot:"#3d7a4a",bg:"#eaf3ec",bd:"#b8dcc0"},
    {label:"ふつう",dot:"#d4aa00",bg:"#fef9e6",bd:"#e8d68a"},
    {label:"やや忙しい",dot:"#e07820",bg:"#fef0dc",bd:"#f0c090"},
    {label:"キツい！",dot:"#d04040",bg:"#fceaea",bd:"#f0b0b0"}
  ];
  document.getElementById("summaryPills").innerHTML=ld.map((l,i)=>`<div class="pill" style="background:${l.bg};border-color:${l.bd}"><span class="pill-dot" style="background:${l.dot}"></span><span style="color:${l.dot};font-size:12px">${l.label} ${counts[i]}人</span></div>`).join("");
  document.getElementById("grid").innerHTML=members.map(cardHtml).join("");
}

function cardHtml(m) {
  const isMe = m.id===myMemberId;
  const pct = calcPct(m.id);
  const lv = getLevel(pct);
  const c = COLORS[m.colorIdx%COLORS.length];
  const us = states[m.id]||{};
  const adj = us.adj||0;
  const comment = us.comment||"";
  const evs = (calData.events || calData)[m.id]||[];
  const showSteam = pct > 70;
  const showSweat = pct > 45;

  const evHtml = evs.length
    ? evs.map(e=>`<div class="ev-row"><span class="ev-time">${e.time}</span><span class="ev-title">${e.name}</span></div>`).join("")
    : `<div class="no-ev">本日の予定なし</div>`;

  const bottomHtml = isMe
    ? `<div class="edit-controls">
        <div class="adj-row">
          <span class="adj-label">本人調整</span>
          <input type="range" min="-30" max="100" step="5" value="${adj}" oninput="window.__adj('${m.id}',this.value)">
          <span class="adj-val" id="av-${m.id}">${adj>0?'+'+adj:adj}</span>
        </div>
        <div id="cmt-area-${m.id}">
          <div class="comment-disp${comment?'':' empty'}" onclick="window.__editCmt('${m.id}')">${comment||'コメントを追加...'}</div>
        </div>
      </div>`
    : `<div class="readonly-block">${comment?`<div class="comment-readonly">"${comment}"</div>`:''}</div>`;

  return `<div class="card${isMe?' is-mine':''}" id="card-${m.id}">
    <div class="card-top">
      <div class="face-wrap">
        ${isMe?'<div class="mine-ring"></div>':''}
        ${faceSvg(pct, c.fg, c.bg)}
        <div class="steam${showSteam?' show':''}">
          <div class="steam-line"></div><div class="steam-line"></div><div class="steam-line"></div>
        </div>
        ${showSweat?'<div class="sweat show">💧</div>':''}
      </div>
      <div class="card-name">${m.name}${isMe?'<span class="mine-badge">自分</span>':''}</div>
      <div class="card-role">${m.role}</div>
    </div>
    <div class="meter-head"><span class="meter-label">詰まり具合</span><span class="meter-pct" id="pct-${m.id}" style="color:${lv.bar}">${pct}%</span></div>
    <div class="track"><div class="bar" id="bar-${m.id}" style="width:${pct}%;background:${lv.bar}"></div></div>
    <div class="status-chip" id="chip-${m.id}" style="background:${lv.bbg};color:${lv.btx}"><span class="chip-dot" style="background:${lv.dot}"></span>${lv.label}</div>
    <div class="events-block">${evHtml}</div>
    ${bottomHtml}
  </div>`;
}

// ── 自分だけ操作 ──
window.__adj = (id,val) => {
  if(id!==myMemberId)return;
  val=parseInt(val);
  if(!states[id])states[id]={};
  states[id].adj=val;
  update(ref(db,`states/${id}`),{adj:val});
  const pct=calcPct(id);const lv=getLevel(pct);
  const b=document.getElementById("bar-"+id);if(b){b.style.width=pct+"%";b.style.background=lv.bar;}
  const p=document.getElementById("pct-"+id);if(p){p.textContent=pct+"%";p.style.color=lv.bar;}
  const ch=document.getElementById("chip-"+id);if(ch){ch.style.background=lv.bbg;ch.style.color=lv.btx;ch.innerHTML=`<span class="chip-dot" style="background:${lv.dot};width:6px;height:6px;border-radius:50%"></span>${lv.label}`;}
  const av=document.getElementById("av-"+id);if(av)av.textContent=val>0?'+'+val:val;
  // 顔も更新
  const card=document.getElementById("card-"+id);
  if(card){
    const fw=card.querySelector(".face-wrap");
    if(fw){
      const c=COLORS[(members.find(m=>m.id===id)||{colorIdx:0}).colorIdx%COLORS.length];
      fw.querySelector(".face-svg")?.remove();
      const tmp=document.createElement("div");tmp.innerHTML=faceSvg(pct,c.fg,c.bg);
      fw.insertBefore(tmp.firstChild,fw.firstChild);
      const steam=fw.querySelector(".steam");if(steam)steam.classList.toggle("show",pct>70);
      const sweat=fw.querySelector(".sweat");if(sweat)sweat.classList.toggle("show",pct>45);
    }
  }
  // サマリー更新
  const counts=[0,0,0,0];members.forEach(m=>{const p=calcPct(m.id);if(p<=20)counts[0]++;else if(p<=45)counts[1]++;else if(p<=70)counts[2]++;else counts[3]++;});
  const ld=[{label:"余裕あり",dot:"#3d7a4a",bg:"#eaf3ec",bd:"#b8dcc0"},{label:"ふつう",dot:"#d4aa00",bg:"#fef9e6",bd:"#e8d68a"},{label:"やや忙しい",dot:"#e07820",bg:"#fef0dc",bd:"#f0c090"},{label:"キツい！",dot:"#d04040",bg:"#fceaea",bd:"#f0b0b0"}];
  document.getElementById("summaryPills").innerHTML=ld.map((l,i)=>`<div class="pill" style="background:${l.bg};border-color:${l.bd}"><span class="pill-dot" style="background:${l.dot}"></span><span style="color:${l.dot};font-size:12px">${l.label} ${counts[i]}人</span></div>`).join("");
};

window.__editCmt = (id) => {
  if(id!==myMemberId)return;
  const area=document.getElementById("cmt-area-"+id);if(!area)return;
  const cur=(states[id]||{}).comment||"";
  area.innerHTML=`<textarea class="comment-inp" id="ci-${id}" rows="2">${cur}</textarea><button class="save-sm" onclick="window.__saveCmt('${id}')">保存</button>`;
  document.getElementById("ci-"+id)?.focus();
};

window.__saveCmt = (id) => {
  if(id!==myMemberId)return;
  const ci=document.getElementById("ci-"+id);
  const val=ci?ci.value.trim():"";
  if(!states[id])states[id]={};
  states[id].comment=val;
  update(ref(db,`states/${id}`),{comment:val});
  const area=document.getElementById("cmt-area-"+id);
  if(area)area.innerHTML=`<div class="comment-disp${val?'':' empty'}" onclick="window.__editCmt('${id}')">${val||'コメントを追加...'}</div>`;
};

// ── 管理ドロワー ──
window.openDrawer = () => {
  editingMembers=JSON.parse(JSON.stringify(members));
  renderDrawer();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
};
window.closeDrawer = () => {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
};

function renderDrawer() {
  document.getElementById("drawerBody").innerHTML=`
    <div class="section-label">登録メンバー（${editingMembers.length}人）</div>
    <div style="font-size:11px;color:var(--subtle);margin-bottom:10px">☰ をドラッグして順番を入れ替えられます</div>
    <div class="member-list" id="editList">${editingMembers.map(memberRowHtml).join("")}</div>
    <div class="divider"></div>
    <div class="section-label">メンバーを追加</div>
    <div class="add-form">
      <div class="form-grid">
        <div><div class="form-label">名前</div><input class="form-inp" id="newName" placeholder="例: 山田"></div>
        <div><div class="form-label">役割</div><input class="form-inp" id="newRole" placeholder="例: 制作"></div>
      </div>
      <div><div class="form-label">カラー</div>
        <div class="color-picker" id="newCP">${COLORS.map((c,i)=>`<div class="color-opt${i===0?' selected':''}" style="background:${c.fg}" onclick="window.__nc(${i})"></div>`).join("")}</div>
      </div>
      <button class="btn btn-gold" style="margin-top:12px;width:100%" onclick="window.__addM()">+ 追加する</button>
    </div>`;
}

function memberRowHtml(m) {
  const c=COLORS[m.colorIdx%COLORS.length];
  return `<div class="member-row" id="mr-${m.id}" draggable="true"
    ondragstart="window.__ds(event,'${m.id}')" ondragover="window.__do(event,'${m.id}')"
    ondragleave="window.__dl(event,'${m.id}')" ondrop="window.__dd(event,'${m.id}')" ondragend="window.__de()">
    <div class="drag-handle"><span></span><span></span><span></span></div>
    <div class="m-avatar-sm" style="background:${c.bg};color:${c.fg}">${m.name.charAt(0)}</div>
    <input class="m-inp" value="${m.name}" onchange="window.__umf('${m.id}','name',this.value)" placeholder="名前">
    <input class="m-inp" value="${m.role}" onchange="window.__umf('${m.id}','role',this.value)" placeholder="役割">
    <button class="btn btn-danger btn-sm" onclick="window.__rm('${m.id}')">削除</button>
  </div>`;
}

window.__umf=(id,f,v)=>{const m=editingMembers.find(x=>x.id===id);if(m)m[f]=v;};
window.__rm=(id)=>{editingMembers=editingMembers.filter(x=>x.id!==id);document.getElementById("mr-"+id)?.remove();document.querySelector(".section-label").textContent=`登録メンバー（${editingMembers.length}人）`;};
window.__nc=(i)=>{newColorIdx=i;document.querySelectorAll("#newCP .color-opt").forEach((el,j)=>el.classList.toggle("selected",j===i));};
window.__addM=()=>{
  const name=document.getElementById("newName").value.trim();
  const role=document.getElementById("newRole").value.trim();
  if(!name){alert("名前を入力してください");return;}
  const id="m_"+Date.now();
  editingMembers.push({id,name,role:role||"スタッフ",colorIdx:newColorIdx});
  renderDrawer();
};
window.__ds=(e,id)=>{dragSrcId=id;e.dataTransfer.effectAllowed="move";setTimeout(()=>document.getElementById("mr-"+id)?.classList.add("dragging"),0);};
window.__do=(e,id)=>{e.preventDefault();if(id===dragSrcId)return;document.querySelectorAll(".member-row").forEach(el=>el.classList.remove("drag-over"));document.getElementById("mr-"+id)?.classList.add("drag-over");};
window.__dl=(e,id)=>{document.getElementById("mr-"+id)?.classList.remove("drag-over");};
window.__dd=(e,tid)=>{e.preventDefault();if(!dragSrcId||dragSrcId===tid)return;const si=editingMembers.findIndex(x=>x.id===dragSrcId),ti=editingMembers.findIndex(x=>x.id===tid);if(si<0||ti<0)return;const[moved]=editingMembers.splice(si,1);editingMembers.splice(ti,0,moved);renderDrawer();};
window.__de=()=>{dragSrcId=null;document.querySelectorAll(".member-row").forEach(el=>{el.classList.remove("dragging");el.classList.remove("drag-over");});};

window.saveMembers = async () => {
  members=JSON.parse(JSON.stringify(editingMembers));
  await set(ref(db,"members"),members);
  closeDrawer();renderBoard();
};

window.copyUrl = () => {
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=event.target;btn.textContent="✓ コピーしました";
    setTimeout(()=>btn.textContent="🔗 URLをコピー",2000);
  });
};

// ── 認証 ──
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth,new GoogleAuthProvider()); }
  catch(e) { alert("ログインに失敗しました: "+e.message); }
};
window.doSignOut = async () => { await fbSignOut(auth); };

// ── 起動 ──
onAuthStateChanged(auth, async (user) => {
  document.getElementById("loadingScreen").style.display="none";
  if (!user) {
    document.getElementById("loginScreen").style.display="flex";
    document.getElementById("mainApp").style.display="none";
    return;
  }
  currentUser=user;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainApp").style.display="block";

  const av=document.getElementById("userAvatar");
  if(user.photoURL)av.innerHTML=`<img src="${user.photoURL}">`;
  else av.textContent=(user.displayName||user.email||"?").charAt(0).toUpperCase();
  document.getElementById("userName").textContent=user.displayName||user.email;

  if(ADMIN_EMAILS.includes(user.email))document.getElementById("adminBtn").style.display="inline-flex";

  myMemberId=EMAIL_TO_MEMBER[user.email]||null;

  // メンバーリスト取得
  const ms=await get(ref(db,"members"));
  if(ms.exists())members=ms.val();
  else{members=JSON.parse(JSON.stringify(DEFAULT_MEMBERS));await set(ref(db,"members"),members);}

  if(!myMemberId){
    const en=(user.email||"").split("@")[0].toLowerCase();
    myMemberId=members.find(m=>m.id===en||m.name.toLowerCase().includes(en))?.id||null;
  }

  // カレンダーデータ取得
  await fetchCalendarData();

  // リアルタイム同期
  onValue(ref(db,"states"),(snap)=>{states=snap.val()||{};renderBoard();});
  onValue(ref(db,"members"),(snap)=>{if(snap.exists()){members=snap.val();renderBoard();}});
  onValue(ref(db,"calData"),(snap)=>{
    if(snap.exists()){
      const saved=snap.val();
      const today=new Date().toISOString().slice(0,10);
      if(saved.date===today){
        calData=saved.events||{};
        updateCalBadge(saved.updatedAt);
        renderBoard();
      }
    }
  });
});
</script>
